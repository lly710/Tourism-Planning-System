spring.security.user.name=admin
spring.security.user.password=change-me

spring.datasource.url=jdbc:mysql://localhost:3306/tourism_system?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=change-me

spring.mail.host=smtp.qq.com
spring.mail.username=your-email@example.com
spring.mail.password=change-me
spring.mail.port=465
user.fromEmail=your-email@example.com

knife4j.basic.username=admin
knife4j.basic.password=change-me

alipay.gateway=https://openapi-sandbox.dl.alipaydev.com/gateway.do
alipay.appId=your-app-id
alipay.privateKey=your-private-key
alipay.publicKey=your-public-key
alipay.returnUrl=http://localhost:8080/payment/result
alipay.notifyUrl=http://localhost:8080/alipay/notify
alipay.charset=UTF-8
alipay.format=json
alipay.signType=RSA2
alipay.fixedPayAmount=0.01

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=10000

amap.key=your-amap-key

aliyun.oss.endpoint=https://oss-cn-beijing.aliyuncs.com
aliyun.oss.bucket-name=your-bucket-name
aliyun.oss.region=cn-beijing
aliyun.oss.access-key-id=your-access-key-id
aliyun.oss.access-key-secret=your-access-key-secret
aliyun.oss.url-domain=https://your-bucket.oss-cn-beijing.aliyuncs.com
aliyun.oss.file-prefix=files/
