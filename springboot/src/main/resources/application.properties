spring.application.name=springboot
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.enable-spring-security=false
spring.security.user.name=${SPRING_SECURITY_USER_NAME:admin}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:change-me}
springdoc.swagger-ui.tags-sorter=alpha

springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.paths-to-match=/**
springdoc.packages-to-scan=org.example.springboot

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tourism_system?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:change-me}
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.use-built-in-alias-types=true
server.port=${SERVER_PORT:1236}

user.defaultPassword=${USER_DEFAULT_PASSWORD:123456}
spring.mail.host=${MAIL_HOST:smtp.qq.com}
spring.mail.username=${MAIL_USERNAME:your-email@example.com}
spring.mail.password=${MAIL_PASSWORD:change-me}
spring.mail.default-encoding=utf-8
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.debug=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.port=${MAIL_PORT:465}
user.fromEmail=${FROM_EMAIL:your-email@example.com}

server.servlet.context-path=/
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/
mybatis-plus.mapper-locations=classpath:/mapper/*.xml
spring.jackson.default-property-inclusion=non_empty

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

knife4j.enable=true
knife4j.setting.language=zh_cn
knife4j.basic.enable=true
knife4j.basic.username=${KNIFE4J_USERNAME:admin}
knife4j.basic.password=${KNIFE4J_PASSWORD:change-me}

alipay.gateway=${ALIPAY_GATEWAY:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
alipay.appId=${ALIPAY_APP_ID:your-app-id}
alipay.privateKey=${ALIPAY_PRIVATE_KEY:your-private-key}
alipay.publicKey=${ALIPAY_PUBLIC_KEY:your-public-key}
alipay.returnUrl=${ALIPAY_RETURN_URL:http://localhost:8080/payment/result}
alipay.notifyUrl=${ALIPAY_NOTIFY_URL:http://localhost:8080/alipay/notify}
alipay.charset=${ALIPAY_CHARSET:UTF-8}
alipay.format=${ALIPAY_FORMAT:json}
alipay.signType=${ALIPAY_SIGN_TYPE:RSA2}
alipay.fixedPayAmount=${ALIPAY_FIXED_PAY_AMOUNT:0.01}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=${REDIS_TIMEOUT:10000}
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

amap.key=${AMAP_KEY:your-amap-key}

aliyun.oss.endpoint=${ALIYUN_OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
aliyun.oss.bucket-name=${ALIYUN_OSS_BUCKET:your-bucket-name}
aliyun.oss.region=${ALIYUN_OSS_REGION:cn-beijing}
aliyun.oss.access-key-id=${ALIYUN_OSS_ACCESS_KEY_ID:your-access-key-id}
aliyun.oss.access-key-secret=${ALIYUN_OSS_ACCESS_KEY_SECRET:your-access-key-secret}
aliyun.oss.url-domain=${ALIYUN_OSS_URL_DOMAIN:https://your-bucket.oss-cn-beijing.aliyuncs.com}
aliyun.oss.file-prefix=${ALIYUN_OSS_FILE_PREFIX:files/}
